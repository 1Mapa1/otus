customerService:
  enabled: true
  name: customer
  dbName: customer_db

  deployment:
    imageRepository: maslovdeveloper/hwapp-customer-service
    imageTag: "7.1"
    replicaCount: 1
    maxSurge: 1
    maxUnavailable: 1
    port: 8000
    protocol: TCP
    startupProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 12
    readinessProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3

  service:
    type: ClusterIP
    port: 80
    protocol: TCP
    name: http
    monitor:
      enabled: true
      port: 8080
      protocol: TCP
      name: monitor

  serviceMonitor:
    enabled: true
    scrapeTimeout: 30s
    honorLabels: true
    path: /metrics

  migrationJob:
    enabled: true
    ttlSecondsAfterFinished: 100
    backoffLimit: 3
    imageRepository: maslovdeveloper/hwapp-customer-migration
    imageTag: "7.0"

  config:
    authUrlOverride: ""
    kafkaAcks: "All"
    kafkaEnableIdempotence: true

  secret:
    dbUser: customer_user
    dbPassword: customer_pass

notificationService:
  enabled: true
  name: notification
  dbName: notification_db

  deployment:
    imageRepository: maslovdeveloper/hwapp-notification-service
    imageTag: "7.4"
    replicaCount: 1
    maxSurge: 1
    maxUnavailable: 1
    port: 8000
    protocol: TCP
    startupProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 12
    readinessProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3

  service:
    type: ClusterIP
    port: 80
    protocol: TCP
    name: http

  migrationJob:
    enabled: true
    ttlSecondsAfterFinished: 100
    backoffLimit: 3
    imageRepository: maslovdeveloper/hwapp-notification-migration
    imageTag: "7.1"

  config:
    authUrlOverride: ""
    kafkaGroupId: notification-service
    kafkaTopics:
      - customers
      - orders

  secret:
    dbUser: notification_user
    dbPassword: notification_pass

