nameOverride: ""
fullnameOverride: ""

global:
  # Должно совпадать с .Chart.Name родительского umbrella; участвует в именах вида <releaseBase>-auth вместе с логикой homework-apps.fullname.
  umbrellaChartName: homework-apps
  # app.kubernetes.io/name для подов/сервисов (как в монолитном chart).
  kubernetesAppName: homework-apps
  peerAuthName: auth
  peerCustomerName: customer
  peerBillingName: billing
  peerWarehouseName: warehouse
  peerDeliveryName: delivery
  dbHost: postgres-postgresql
  dbPort: "5432"
  environment: Development
  secretType: Opaque
  clusterDomain: cluster.local
  # Пусто — Bitnami Kafka (KRaft): <kafkaClusterReleaseName>-controller-headless.<namespace>.svc.<clusterDomain>:9092
  kafkaBootstrapServers: ""
  kafkaClusterReleaseName: kafka

authService:
  enabled: true
  name: auth
  dbName: auth_db

  deployment:
    imageRepository: maslovdeveloper/hwapp-auth-service
    imageTag: "7.0"
    replicaCount: 1
    maxSurge: 1
    maxUnavailable: 1
    port: 8000
    protocol: TCP
    startupProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 12
    readinessProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3

  service:
    type: ClusterIP
    port: 80
    protocol: TCP
    name: http
    monitor:
      enabled: false
      port: 8080
      protocol: TCP
      name: monitor

  serviceMonitor:
    enabled: false
    scrapeTimeout: 30s
    honorLabels: true
    path: /metrics

  migrationJob:
    enabled: true
    ttlSecondsAfterFinished: 100
    backoffLimit: 3
    imageRepository: maslovdeveloper/hwapp-auth-migration
    imageTag: "7.0"

  config:
    # Optional override. Empty value means auto-resolve in-cluster URL.
    msCustomerBaseUrlOverride: ""
    msCustomerTimeout: "00:00:10"
    msBillingBaseUrlOverride: ""
    msBillingTimeout: "00:00:10"
    # Optional override. Empty value means use AuthService in-cluster URL.
    jwtIssuerOverride: ""
    jwtLifetimeMinutes: "60"

  secret:
    dbUser: auth_user
    dbPassword: auth_pass
    jwtPrivateKeyPem: |
      -----BEGIN RSA PRIVATE KEY-----
