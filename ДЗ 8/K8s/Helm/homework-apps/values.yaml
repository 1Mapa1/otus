ingress:
  enabled: true
  className: nginx
  host: arch.homework
  paths:
    - path: /api/auth
      service: authService
    - path: /.well-known
      service: authService
    - path: /api/customers
      service: customerService
    - path: /api/notifications
      service: notificationService
    - path: /api/billing
      service: billingService
    - path: /api/internal/warehouse
      service: warehouseService
    - path: /api/warehouse
      service: warehouseService
    - path: /api/internal/delivery
      service: deliveryService
    - path: /api/delivery
      service: deliveryService
    - path: /api/orders
      service: orderService
