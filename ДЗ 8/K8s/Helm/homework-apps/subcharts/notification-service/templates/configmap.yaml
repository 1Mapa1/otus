{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "notification-service.fullname" . }}
  labels:
    {{- include "notification-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
data:
  DB_HOST: {{ .Values.global.dbHost }}
  DB_PORT: {{ .Values.global.dbPort | quote }}
  DB_NAME: {{ .Values.dbName }}
  ASPNETCORE_ENVIRONMENT: {{ .Values.global.environment }}
  Auth__Url: {{ default (include "notification-service.authServiceUrl" .) .Values.config.authUrlOverride | quote }}
  Kafka__BootstrapServers: {{ default (include "notification-service.kafkaBootstrapServersDefault" .) .Values.global.kafkaBootstrapServers | quote }}
  Kafka__GroupId: {{ .Values.config.kafkaGroupId | quote }}
  {{- range $i, $topic := .Values.config.kafkaTopics }}
  Kafka__Topics__{{ $i }}: {{ $topic | quote }}
  {{- end }}
{{- end }}
