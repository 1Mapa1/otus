{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "order-service.fullname" . }}
  labels:
    {{- include "order-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
data:
  DB_HOST: {{ .Values.global.dbHost }}
  DB_PORT: {{ .Values.global.dbPort | quote }}
  DB_NAME: {{ .Values.dbName }}
  ASPNETCORE_ENVIRONMENT: {{ .Values.global.environment }}
  Auth__Url: {{ default (include "order-service.authServiceUrl" .) .Values.config.authUrlOverride | quote }}
  Ms__Billing__BaseUrl: {{ default (include "order-service.billingServiceUrl" .) .Values.config.msBillingBaseUrlOverride | quote }}
  Ms__Billing__Timeout: {{ .Values.config.msBillingTimeout | quote }}
  Ms__Warehouse__BaseUrl: {{ default (include "order-service.warehouseServiceUrl" .) .Values.config.msWarehouseBaseUrlOverride | quote }}
  Ms__Warehouse__Timeout: {{ .Values.config.msWarehouseTimeout | quote }}
  Ms__Delivery__BaseUrl: {{ default (include "order-service.deliveryServiceUrl" .) .Values.config.msDeliveryBaseUrlOverride | quote }}
  Ms__Delivery__Timeout: {{ .Values.config.msDeliveryTimeout | quote }}
  OrderSaga__BatchSize: {{ .Values.config.orderSagaBatchSize | quote }}
  OrderSaga__LockDuration: {{ .Values.config.orderSagaLockDuration | quote }}
  OrderSaga__PollingInterval: {{ .Values.config.orderSagaPollingInterval | quote }}
  Kafka__BootstrapServers: {{ default (include "order-service.kafkaBootstrapServersDefault" .) .Values.global.kafkaBootstrapServers | quote }}
  Kafka__Acks: {{ .Values.config.kafkaAcks | quote }}
  Kafka__EnableIdempotence: {{ .Values.config.kafkaEnableIdempotence | quote }}
{{- end }}
