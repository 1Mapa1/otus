apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "customer-service.fullname" . }}-migration
  labels:
    {{- include "customer-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
  completions: 1
  backoffLimit: {{ .Values.job.backoffLimit }}
  template:
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: {{ .Values.job.imageRepository }}:{{ .Values.job.imageTag }}
        env:
          - name: DB_HOST
            valueFrom:
              configMapKeyRef: 
                name: {{ include "customer-service.fullname" . }}
                key: DB_HOST
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "customer-service.fullname" . }}
                key: DB_PORT
          - name: DB_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "customer-service.fullname" . }}
                key: DB_NAME
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: {{ include "customer-service.fullname" . }}
                key: DB_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ include "customer-service.fullname" . }}
                key: DB_PASSWORD
      restartPolicy: Never
