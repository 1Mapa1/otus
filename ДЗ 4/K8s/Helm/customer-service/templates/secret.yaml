apiVersion: v1
kind: Secret
metadata:
  name: {{ include "customer-service.fullname" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
type: {{ .Values.secret.type | default "Opaque" }}
stringData:
  DB_USER: {{ .Values.secret.dbUser }}
  DB_PASSWORD: {{ .Values.secret.dbPassword }}
