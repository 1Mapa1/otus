nameOverride: ""
fullnameOverride: ""

common:
  dbHost: postgres-postgresql
  dbPort: "5432"
  environment: Development
  secretType: Opaque
  clusterDomain: cluster.local

authService:
  enabled: true
  name: auth
  dbName: auth_db

  deployment:
    imageRepository: maslovdeveloper/hwapp-auth-service
    imageTag: "1.7"
    replicaCount: 2
    maxSurge: 1
    maxUnavailable: 1
    port: 8000
    protocol: TCP
    startupProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 12
    readinessProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3

  service:
    type: ClusterIP
    port: 80
    protocol: TCP
    name: http
    monitor:
      enabled: false
      port: 8080
      protocol: TCP
      name: monitor

  serviceMonitor:
    enabled: false
    scrapeTimeout: 30s
    honorLabels: true
    path: /metrics

  migrationJob:
    enabled: true
    ttlSecondsAfterFinished: 100
    backoffLimit: 3
    imageRepository: maslovdeveloper/hwapp-auth-migration
    imageTag: "1.2"

  config:
    # Optional override. Empty value means auto-resolve in-cluster URL.
    msCustomerBaseUrlOverride: ""
    msCustomerTimeout: "00:00:10"
    # Optional override. Empty value means use AuthService in-cluster URL.
    jwtIssuerOverride: ""
    jwtLifetimeMinutes: "60"

  secret:
    dbUser: auth_user
    dbPassword: auth_pass
    jwtPrivateKeyPem: |
