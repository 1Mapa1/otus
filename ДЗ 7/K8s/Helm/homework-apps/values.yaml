customerService:
  enabled: true
  name: customer
  dbName: customer_db

  deployment:
    imageRepository: maslovdeveloper/hwapp-customer-service
    imageTag: "1.7"
    replicaCount: 3
    maxSurge: 1
    maxUnavailable: 1
    port: 8000
    protocol: TCP
    startupProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 12
    readinessProbe:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3

  service:
    type: ClusterIP
    port: 80
    protocol: TCP
    name: http
    monitor:
      enabled: true
      port: 8080
      protocol: TCP
      name: monitor

  serviceMonitor:
    enabled: true
    scrapeTimeout: 30s
    honorLabels: true
    path: /metrics

  migrationJob:
    enabled: true
    ttlSecondsAfterFinished: 100
    backoffLimit: 3
    imageRepository: maslovdeveloper/hwapp-customer-migration
    imageTag: "1.0"

  config:
    # Optional override. Empty value means auto-resolve in-cluster URL.
    authUrlOverride: ""

  secret:
    dbUser: customer_user
    dbPassword: customer_pass

ingress:
  enabled: true
  className: nginx
  host: arch.homework
  paths:
    - path: /api/auth
      service: authService
    - path: /.well-known
      service: authService
    - path: /api/customers
      service: customerService