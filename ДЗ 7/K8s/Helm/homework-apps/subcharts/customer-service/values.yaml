# Defaults for standalone install; overridden by umbrella parent values.
global:
  umbrellaChartName: homework-apps
  kubernetesAppName: homework-apps
  peerAuthName: auth
  peerCustomerName: customer
  clusterDomain: cluster.local
  secretType: Opaque
  dbHost: postgres-postgresql
  dbPort: "5432"
  environment: Development
  kafkaBootstrapServers: ""
  kafkaClusterReleaseName: kafka

enabled: true
name: customer
dbName: customer_db

deployment:
  imageRepository: maslovdeveloper/hwapp-customer-service
  imageTag: "2.1"
  replicaCount: 3
  maxSurge: 1
  maxUnavailable: 1
  port: 8000
  protocol: TCP
  startupProbe:
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 12
  readinessProbe:
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1
  livenessProbe:
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  protocol: TCP
  name: http
  monitor:
    enabled: true
    port: 8080
    protocol: TCP
    name: monitor

serviceMonitor:
  enabled: true
  scrapeTimeout: 30s
  honorLabels: true
  path: /metrics

migrationJob:
  enabled: true
  ttlSecondsAfterFinished: 100
  backoffLimit: 3
  imageRepository: maslovdeveloper/hwapp-customer-migration
  imageTag: "1.2"

config:
  authUrlOverride: ""
  kafkaAcks: "All"
  kafkaEnableIdempotence: true

secret:
  dbUser: customer_user
  dbPassword: customer_pass
