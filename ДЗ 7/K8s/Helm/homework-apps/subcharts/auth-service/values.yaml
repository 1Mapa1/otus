# Defaults for standalone install; overridden by umbrella parent values.
global:
  umbrellaChartName: homework-apps
  kubernetesAppName: homework-apps
  peerAuthName: auth
  peerCustomerName: customer
  peerBillingName: billing
  clusterDomain: cluster.local
  secretType: Opaque
  dbHost: postgres-postgresql
  dbPort: "5432"
  environment: Development

enabled: true
name: auth
dbName: auth_db

deployment:
  imageRepository: maslovdeveloper/hwapp-auth-service
  imageTag: "7.0"
  replicaCount: 2
  maxSurge: 1
  maxUnavailable: 1
  port: 8000
  protocol: TCP
  startupProbe:
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 12
  readinessProbe:
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1
  livenessProbe:
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  protocol: TCP
  name: http
  monitor:
    enabled: false
    port: 8080
    protocol: TCP
    name: monitor

serviceMonitor:
  enabled: false
  scrapeTimeout: 30s
  honorLabels: true
  path: /metrics

migrationJob:
  enabled: true
  ttlSecondsAfterFinished: 100
  backoffLimit: 3
  imageRepository: maslovdeveloper/hwapp-auth-migration
  imageTag: "7.0"

config:
  msCustomerBaseUrlOverride: ""
  msCustomerTimeout: "00:00:10"
  msBillingBaseUrlOverride: ""
  msBillingTimeout: "00:00:10"
  jwtIssuerOverride: ""
  jwtLifetimeMinutes: "60"

secret:
  dbUser: auth_user
  dbPassword: auth_pass
  jwtPrivateKeyPem: ""
  jwtKeyId: default-key
